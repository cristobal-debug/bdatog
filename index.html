<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Navieras — Base de Contactos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #171b25;
  --bg3: #1e2333;
  --bg4: #252b3d;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --text2: #8b92a8;
  --text3: #545c75;
  --accent: #4d7cfe;
  --accent2: #2d5ce8;
  --green: #2ecc8a;
  --green-bg: rgba(46,204,138,0.1);
  --amber: #f5a623;
  --amber-bg: rgba(245,166,35,0.1);
  --red: #ff5c5c;
  --red-bg: rgba(255,92,92,0.1);
  --blue: #4d7cfe;
  --blue-bg: rgba(77,124,254,0.1);
  --purple: #a855f7;
  --purple-bg: rgba(168,85,247,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px; position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 16px; }
.logo-text { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.header-stats { display: flex; gap: 1.5rem; }
.hstat { text-align: center; }
.hstat-num { font-size: 18px; font-weight: 600; color: var(--accent); font-family: 'DM Mono', monospace; }
.hstat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }

/* LAYOUT */
.layout { display: flex; height: calc(100vh - 60px); }

/* SIDEBAR */
.sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto; padding: 1rem;
}
.sidebar-section { margin-bottom: 1.5rem; }
.sidebar-title { font-size: 10px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; padding-left: 4px; }
.filter-btn {
  width: 100%; text-align: left; padding: 7px 10px; border-radius: 6px;
  border: none; background: none; color: var(--text2); font-size: 13px;
  cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
.filter-btn:hover { background: var(--bg3); color: var(--text); }
.filter-btn.active { background: var(--blue-bg); color: var(--accent); font-weight: 500; }
.filter-count {
  font-size: 11px; background: var(--bg4); border-radius: 10px;
  padding: 1px 7px; font-family: 'DM Mono', monospace;
}
.filter-btn.active .filter-count { background: var(--accent); color: white; }

/* MAIN */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* TOOLBAR */
.toolbar {
  padding: 1rem 1.5rem; background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--text3); }
#searchInput {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px 9px 38px;
  color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border 0.2s;
}
#searchInput:focus { border-color: var(--accent); }
#searchInput::placeholder { color: var(--text3); }

.view-toggle { display: flex; background: var(--bg3); border-radius: 8px;
  border: 1px solid var(--border); overflow: hidden; }
.view-btn { padding: 8px 14px; border: none; background: none; color: var(--text3);
  cursor: pointer; font-size: 13px; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.view-btn.active { background: var(--accent); color: white; }
.results-label { font-size: 13px; color: var(--text3); white-space: nowrap; }

/* TABLE VIEW */
.table-container { flex: 1; overflow: auto; padding: 0 1.5rem 1.5rem; }
table { width: 100%; border-collapse: separate; border-spacing: 0 3px; margin-top: 1rem; }
thead th {
  text-align: left; font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.06em;
  padding: 0 14px 8px; position: sticky; top: 0; background: var(--bg);
  border-bottom: 1px solid var(--border);
}
tbody tr {
  background: var(--bg2); border-radius: 8px; cursor: pointer;
  transition: background 0.1s;
}
tbody tr:hover { background: var(--bg3); }
tbody td {
  padding: 11px 14px; font-size: 13px; color: var(--text);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
tbody td:first-child { border-left: 1px solid var(--border); border-radius: 8px 0 0 8px; }
tbody td:last-child { border-right: 1px solid var(--border); border-radius: 0 8px 8px 0; }

/* CARDS VIEW */
.cards-container { flex: 1; overflow: auto; padding: 1.5rem; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
}
.card:hover { border-color: var(--border2); transform: translateY(-1px); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-empresa { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
.card-persona { font-size: 12px; color: var(--text2); margin-top: 2px; }
.card-fields { display: flex; flex-direction: column; gap: 5px; }
.card-field { display: flex; gap: 6px; align-items: flex-start; font-size: 12px; color: var(--text2); }
.card-field-icon { font-size: 12px; flex-shrink: 0; margin-top: 1px; }
.card-field-val { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-footer { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
  display: flex; gap: 6px; flex-wrap: wrap; }

/* BADGES */
.badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
  white-space: nowrap;
}
.badge-directo { background: var(--green-bg); color: var(--green); }
.badge-linkedin { background: var(--blue-bg); color: var(--blue); }
.badge-campana { background: var(--amber-bg); color: var(--amber); }
.badge-crm { background: var(--purple-bg); color: var(--purple); }
.badge-intl { background: rgba(100,100,255,0.1); color: #8899ff; }
.badge-pendiente { background: var(--red-bg); color: var(--red); }

/* DETAIL PANEL */
.detail-panel {
  width: 380px; flex-shrink: 0; background: var(--bg2);
  border-left: 1px solid var(--border); overflow-y: auto;
  transform: translateX(100%); transition: transform 0.25s ease;
}
.detail-panel.open { transform: translateX(0); }
.detail-header {
  padding: 1.5rem; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start;
}
.detail-empresa { font-size: 18px; font-weight: 600; color: var(--text); line-height: 1.3; }
.detail-persona { font-size: 14px; color: var(--text2); margin-top: 4px; }
.detail-cargo { font-size: 12px; color: var(--text3); }
.close-btn { background: var(--bg3); border: none; color: var(--text2);
  width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.close-btn:hover { background: var(--bg4); color: var(--text); }
.detail-body { padding: 1.5rem; }
.detail-section { margin-bottom: 1.5rem; }
.detail-section-title { font-size: 10px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.detail-field { margin-bottom: 10px; }
.detail-field-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
.detail-field-val { font-size: 13px; color: var(--text); line-height: 1.5; word-break: break-word; }
.detail-field-val a { color: var(--accent); text-decoration: none; }
.detail-field-val a:hover { text-decoration: underline; }
.copy-btn {
  font-size: 11px; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); padding: 3px 8px; border-radius: 5px; cursor: pointer;
  margin-left: 6px; vertical-align: middle; font-family: 'DM Sans', sans-serif;
}
.copy-btn:hover { background: var(--bg4); color: var(--text); }
.notes-box {
  background: var(--bg3); border-radius: 8px; padding: 12px;
  font-size: 13px; color: var(--text2); line-height: 1.6; border: 1px solid var(--border);
}

/* EMPTY */
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text3); gap: 10px; padding: 3rem; text-align: center; }
.empty-icon { font-size: 48px; opacity: 0.3; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .detail-panel { width: 100%; position: fixed; top: 60px; right: 0; height: calc(100vh - 60px); z-index: 50; }
  .header-stats { display: none; }
}
</style>
</head>

// Normalize fuente for filtering
const DATA = RAW_DATA.map((r, i) => ({...r, _id: i,
  fuente: normalFuente(r.fuente)
}));

function normalFuente(f) {
  if (!f) return 'CRM';
  const fl = f.toLowerCase();
  if (fl.includes('directo') || fl.includes('direct')) return 'Contacto directo';
  if (fl.includes('linkedin')) return 'Linkedin';
  if (fl.includes('campañ') || fl.includes('masiva')) return 'Campaña masiva';
  if (fl.includes('espa')) return 'Campaña España';
  if (fl.includes('internac')) return 'Base internacional';
  if (fl.includes('pendient')) return 'Pendientes';
  if (fl.includes('crm') || fl.includes('chatgpt') || fl.includes('bunkertrade') || fl.includes('referido') || fl.includes('freddy')) return 'CRM';
  return f;
}

let currentFilter = { fuente: 'all', has: null };
let currentSort = { col: null, asc: true };
let currentView = 'table';
let selectedId = null;
let filtered = [];

// Stats
const empresasSet = new Set(DATA.filter(r => r.empresa).map(r => r.empresa.toLowerCase()));
document.getElementById('totalCount').textContent = DATA.length;
document.getElementById('empresasCount').textContent = empresasSet.size;
document.getElementById('emailCount').textContent = DATA.filter(r => r.email && r.email.includes('@')).length;

// Filter counts
const countByFuente = (val) => val === 'all'
  ? DATA.length
  : DATA.filter(r => r.fuente === val || (val === 'CRM' && !['Contacto directo','Linkedin','Campaña masiva','Campaña España','Base internacional','Pendientes'].includes(r.fuente))).length;

document.getElementById('fc-all').textContent = countByFuente('all');

document.getElementById('fc-li').textContent = countByFuente('Linkedin');

function getSearchQuery() {
  return document.getElementById('searchInput').value.toLowerCase().trim();
}

function applyFilters() {
  const q = getSearchQuery();
  filtered = DATA.filter(r => {
    // Fuente filter
    if (currentFilter.fuente !== 'all') {
      if (r.fuente !== currentFilter.fuente) return false;
    }
    // Has filter
    if (currentFilter.has === 'email' && !r.email?.includes('@')) return false;
    if (currentFilter.has === 'telefono' && !r.telefono) return false;
    if (currentFilter.has === 'persona' && !r.persona) return false;
    if (currentFilter.has === 'notas' && !r.notas) return false;
    // Search
    if (q) {
      const hay = [r.empresa, r.persona, r.email, r.telefono, r.notas, r.cargo, r.pais, r.estado].join(' ').toLowerCase();
      if (!q.split(' ').every(t => hay.includes(t))) return false;
    }
    return true;
  });

  if (currentSort.col) {
    filtered.sort((a, b) => {
      const av = (a[currentSort.col] || '').toLowerCase();
      const bv = (b[currentSort.col] || '').toLowerCase();
      return currentSort.asc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }

  document.getElementById('resultsLabel').textContent = `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}`;
  render();
}

function badgeClass(fuente) {
  const f = (fuente||'').toLowerCase();
  if (f.includes('directo')) return 'badge-directo';
  if (f.includes('linkedin')) return 'badge-linkedin';
  if (f.includes('campañ') || f.includes('masiva')) return 'badge-campana';
  if (f.includes('internac')) return 'badge-intl';
  if (f.includes('pendient')) return 'badge-pendiente';
  return 'badge-crm';
}

function render() {
  if (currentView === 'table') renderTable();
  else renderCards();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text3)">Sin resultados para esta búsqueda</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(r => `
    <tr onclick="openDetail(${r._id})">
      <td title="${esc(r.empresa)}" style="font-weight:500">${esc(r.empresa) || '<span style=\"color:var(--text3)\">—</span>'}</td>
      <td title="${esc(r.persona)}">${esc(r.persona) || '<span style=\"color:var(--text3)\">—</span>'}</td>
      <td title="${esc(r.cargo)}" style="color:var(--text2);font-size:12px">${esc(r.cargo) || ''}</td>
      <td title="${esc(r.email)}" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--accent)">${r.email ? `<a href="mailto:${esc(r.email.split('/')[0].trim())}" onclick="event.stopPropagation()">${esc(r.email)}</a>` : '<span style=\"color:var(--text3)\">—</span>'}</td>
      <td title="${esc(r.telefono)}" style="font-family:'DM Mono',monospace;font-size:12px">${esc(r.telefono) || '<span style=\"color:var(--text3)\">—</span>'}</td>
      <td style="font-size:12px;color:var(--text2)">${esc(r.ultimo_contacto) || ''}</td>
      <td><span class="badge ${badgeClass(r.fuente)}">${esc(r.fuente)}</span></td>
    </tr>
  `).join('');
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text3)">Sin resultados</div>`;
    return;
  }
  grid.innerHTML = filtered.map(r => `
    <div class="card" onclick="openDetail(${r._id})">
      <div class="card-top">
        <div>
          <div class="card-empresa">${esc(r.empresa) || '<em style="color:var(--text3);font-size:12px">Sin empresa</em>'}</div>
          ${r.persona ? `<div class="card-persona">👤 ${esc(r.persona)}</div>` : ''}
        </div>
        <span class="badge ${badgeClass(r.fuente)}">${esc(r.fuente)}</span>
      </div>
      <div class="card-fields">
        ${r.email ? `<div class="card-field"><span class="card-field-icon">✉</span><span class="card-field-val" title="${esc(r.email)}">${esc(r.email)}</span></div>` : ''}
        ${r.telefono ? `<div class="card-field"><span class="card-field-icon">📞</span><span class="card-field-val">${esc(r.telefono)}</span></div>` : ''}
        ${r.pais ? `<div class="card-field"><span class="card-field-icon">🌍</span><span class="card-field-val">${esc(r.pais)}</span></div>` : ''}
        ${r.ultimo_contacto ? `<div class="card-field"><span class="card-field-icon">📅</span><span class="card-field-val">${esc(r.ultimo_contacto)}</span></div>` : ''}
      </div>
      ${r.notas ? `<div class="card-footer"><div style="font-size:11px;color:var(--text2);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(r.notas)}</div></div>` : ''}
    </div>
  `).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openDetail(id) {
  const r = DATA.find(x => x._id === id);
  if (!r) return;
  selectedId = id;
  document.getElementById('dEmpresa').textContent = r.empresa || '—';
  document.getElementById('dPersona').textContent = r.persona || '';
  document.getElementById('dCargo').textContent = r.cargo || '';
  
  const emailEl = document.getElementById('dEmail');
  if (r.email) {
    const emails = r.email.split('/').map(e => e.trim()).filter(Boolean);
    emailEl.innerHTML = emails.map(e => 
      `<a href="mailto:${esc(e)}">${esc(e)}</a>`
    ).join('<br>') + `<button class="copy-btn" onclick="copyText('${esc(r.email)}')">copiar</button>`;
  } else emailEl.textContent = '—';
  
  const telEl = document.getElementById('dTelefono');
  if (r.telefono) {
    telEl.innerHTML = `${esc(r.telefono)} <button class="copy-btn" onclick="copyText('${esc(r.telefono)}')">copiar</button>`;
  } else telEl.textContent = '—';
  
  document.getElementById('dContacto').textContent = r.ultimo_contacto || '—';
  document.getElementById('dPais').textContent = r.pais || '—';
  document.getElementById('dFuente').textContent = r.fuente || '—';
  document.getElementById('dEstado').textContent = r.estado || '—';
  
  const notasSec = document.getElementById('dNotasSection');
  const notasEl = document.getElementById('dNotas');
  if (r.notas) {
    notasSec.style.display = 'block';
    notasEl.textContent = r.notas;
  } else {
    notasSec.style.display = 'none';
  }
  
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedId = null;
}

function copyText(t) {
  navigator.clipboard.writeText(t).catch(() => {
    const el = document.createElement('textarea');
    el.value = t; document.body.appendChild(el); el.select(); document.execCommand('copy'); el.remove();
  });
}

function setFilter(type, val, btn) {
  // Handle "has" filters as toggles
  if (type === 'has') {
    if (currentFilter.has === val) {
      currentFilter.has = null;
      btn.classList.remove('active');
    } else {
      document.querySelectorAll('[data-filter="has"]').forEach(b => b.classList.remove('active'));
      currentFilter.has = val;
      btn.classList.add('active');
    }
  } else {
    document.querySelectorAll('[data-filter="fuente"]').forEach(b => b.classList.remove('active'));
    currentFilter.fuente = val;
    btn.classList.add('active');
  }
  applyFilters();
}

function onSearch() { applyFilters(); }

function sortBy(col) {
  if (currentSort.col === col) currentSort.asc = !currentSort.asc;
  else { currentSort.col = col; currentSort.asc = true; }
  applyFilters();
}

function setView(v) {
  currentView = v;
  document.getElementById('tableView').style.display = v === 'table' ? 'flex' : 'none';
  document.getElementById('tableView').style.flexDirection = 'column';
  document.getElementById('cardsView').style.display = v === 'cards' ? 'block' : 'none';
  document.getElementById('btnTable').classList.toggle('active', v === 'table');
  document.getElementById('btnCards').classList.toggle('active', v === 'cards');
  render();
}

function exportCSV() {
  const cols = ['empresa','persona','cargo','email','telefono','ultimo_contacto','fuente','pais','estado','notas'];
  const header = cols.join(',');
  const rows = filtered.map(r => cols.map(c => `"${(r[c]||'').replace(/"/g,'""')}"`).join(','));
  const csv = [header, ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'navieras_crm.csv'; a.click();
  URL.revokeObjectURL(url);
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') closeDetail();
});

// Init
applyFilters();
</script>
